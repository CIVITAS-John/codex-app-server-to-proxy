name: Publish npm prerelease

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run all gates and the bump locally but skip tag push and publish
        type: boolean
        default: false

concurrency:
  group: npm-prerelease
  cancel-in-progress: false

jobs:
  offline:
    name: Run the full offline matrix
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  publish:
    name: Validate and publish with provenance
    needs: offline
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/codex-openai-proxy
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Require a main-branch dispatch
        shell: bash
        env:
          DISPATCH_REF: ${{ github.ref }}
        run: |
          if [[ "$DISPATCH_REF" != "refs/heads/main" ]]; then
            echo "::error::Publish npm prerelease must be dispatched from main, not ${DISPATCH_REF}."
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install the trusted-publishing npm CLI
        run: npm install --global npm@11.18.0
      - name: Verify the trusted-publisher identity
        shell: bash
        env:
          EXPECTED_ENVIRONMENT: npm
          EXPECTED_NPM_VERSION: 11.18.0
          EXPECTED_PACKAGE: codex-openai-proxy
          EXPECTED_REPOSITORY: CIVITAS-John/codex-app-server-to-proxy
          EXPECTED_WORKFLOW_REF: CIVITAS-John/codex-app-server-to-proxy/.github/workflows/publish-prerelease.yml@refs/heads/main
        run: |
          ACTUAL_NPM_VERSION=$(npm --version)
          if [[ "$ACTUAL_NPM_VERSION" != "$EXPECTED_NPM_VERSION" ]]; then
            echo "::error::Expected npm ${EXPECTED_NPM_VERSION} for trusted publishing, but found ${ACTUAL_NPM_VERSION}."
            exit 1
          fi
          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "::error::GitHub did not expose its OIDC token endpoint. Confirm that this job retains id-token: write."
            exit 1
          fi

          OIDC_SEPARATOR="?"
          if [[ "$ACTIONS_ID_TOKEN_REQUEST_URL" == *"?"* ]]; then
            OIDC_SEPARATOR="&"
          fi
          curl --fail --silent --show-error \
            --header "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}${OIDC_SEPARATOR}audience=npm:registry.npmjs.org" |
            node --input-type=module -e '
              import assert from "node:assert/strict";

              const chunks = [];
              for await (const chunk of process.stdin) chunks.push(chunk);
              const response = JSON.parse(Buffer.concat(chunks).toString("utf8"));
              assert.equal(typeof response.value, "string", "GitHub OIDC response must contain a token");
              const segments = response.value.split(".");
              assert.equal(segments.length, 3, "GitHub OIDC token must be a JWT");
              const claims = JSON.parse(Buffer.from(segments[1], "base64url").toString("utf8"));
              assert.equal(claims.aud, "npm:registry.npmjs.org", "OIDC audience must target npm");
              assert.equal(claims.repository, process.env.EXPECTED_REPOSITORY, "OIDC repository claim must match npm trusted publishing");
              assert.equal(claims.workflow_ref, process.env.EXPECTED_WORKFLOW_REF, "OIDC workflow claim must match npm trusted publishing");
              assert.equal(claims.environment, process.env.EXPECTED_ENVIRONMENT, "OIDC environment claim must match npm trusted publishing");
              assert.equal(claims.ref, "refs/heads/main", "OIDC ref claim must identify main");
              assert.equal(claims.runner_environment, "github-hosted", "npm trusted publishing requires a GitHub-hosted runner");

              const packageName = encodeURIComponent(process.env.EXPECTED_PACKAGE);
              const exchange = await fetch(`https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${packageName}`, {
                method: "POST",
                headers: { Authorization: `Bearer ${response.value}` },
              });
              assert.equal(exchange.ok, true, `npm rejected the trusted-publisher identity with HTTP ${exchange.status}`);
              const credential = await exchange.json();
              assert.equal(typeof credential.token, "string", "npm OIDC exchange must return a temporary publish credential");
              console.log(`Verified npm ${process.env.EXPECTED_NPM_VERSION}; npm accepted the expected GitHub trusted-publisher identity.`);
            '
      - run: npm ci
      - name: Verify npm package bootstrap
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VIEW_ERROR="$RUNNER_TEMP/npm-view-error.log"
          if npm view "$PACKAGE_NAME" name --json >/dev/null 2>"$VIEW_ERROR"; then
            exit 0
          fi
          if grep -q "E404" "$VIEW_ERROR"; then
            echo "::error::${PACKAGE_NAME} does not exist on npm. Bootstrap its first release manually, then configure this workflow as its trusted publisher."
            exit 1
          fi
          echo "::error::Unable to verify ${PACKAGE_NAME} on npm because of a registry, network, or authentication failure. This is not a first-release bootstrap signal."
          exit 1
      - name: Create the prerelease commit and tag locally
        id: bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version prerelease --preid=rc
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Verify the prerelease version is unpublished
        shell: bash
        run: |
          node --input-type=module -e '
            import assert from "node:assert/strict";
            assert.match(process.env.VERSION, /^\d+\.\d+\.\d+-[0-9A-Za-z.-]+$/, "package version must be a prerelease");
          '

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VIEW_ERROR="$RUNNER_TEMP/npm-version-view-error.log"
          if npm view "$PACKAGE_NAME@$VERSION" version --json >/dev/null 2>"$VIEW_ERROR"; then
            if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
              echo "::error::${PACKAGE_NAME}@${VERSION} is already published and tag v${VERSION} exists: a prior run published but could not update main. Recover with: git fetch --tags && git merge v${VERSION} && git push origin main, then redispatch."
              exit 1
            fi
            echo "::error::${PACKAGE_NAME}@${VERSION} is already published."
            exit 1
          fi
          if grep -q "E404" "$VIEW_ERROR"; then
            exit 0
          fi
          echo "::error::Unable to verify ${PACKAGE_NAME}@${VERSION} on npm because of a registry, network, or authentication failure."
          exit 1
      - name: Run offline release gate on the bumped tree
        run: npm run check
      - name: Test and retain the packed npm CLI
        id: packed
        shell: bash
        run: |
          PACKAGE_TARBALL=$(node -p "const p=require('./package.json'); p.name + '-' + p.version + '.tgz'")
          npm run test:package -- --retain
          test -f "$PACKAGE_TARBALL"
          echo "tarball=./$PACKAGE_TARBALL" >> "$GITHUB_OUTPUT"
      - name: Retain the tested npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball-v${{ steps.bump.outputs.version }}
          path: ${{ steps.packed.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14
      - name: Report dry-run result
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          echo "Dry run complete for v$VERSION. No refs were pushed and nothing was published."
          sha256sum "${{ steps.packed.outputs.tarball }}"
      - name: Push the prerelease tag
        if: ${{ !inputs.dry_run }}
        id: push_tag
        shell: bash
        run: |
          TAG_REF="refs/tags/v$VERSION"
          TAG_QUERY_STATUS=0
          git ls-remote --exit-code --tags origin "$TAG_REF" >/dev/null || TAG_QUERY_STATUS=$?
          if [[ "$TAG_QUERY_STATUS" -eq 0 ]]; then
            git push origin ":$TAG_REF"
            echo "Replaced leftover remote tag v$VERSION from an earlier failed run; this run already confirmed the version is not on npm."
          elif [[ "$TAG_QUERY_STATUS" -ne 2 ]]; then
            echo "::error::Unable to check origin for an existing v$VERSION tag. No refs were changed."
            exit 1
          fi
          git push origin "$TAG_REF"
      - name: Publish prerelease through npm trusted publishing
        if: ${{ !inputs.dry_run }}
        id: publish
        shell: bash
        run: |
          if npm publish "${{ steps.packed.outputs.tarball }}" --provenance --tag next --access public; then
            exit 0
          fi
          echo "::error::npm rejected the OIDC publish. Confirm the package trusted publisher allows npm publish and exactly matches repository CIVITAS-John/codex-app-server-to-proxy, workflow publish-prerelease.yml, and environment npm."
          exit 1
      - name: Fast-forward main to the published commit
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          if git push origin HEAD:main; then
            exit 0
          fi
          echo "::error::The prerelease was published, but main could not be updated from this run. Land the tagged commit manually with: git fetch --tags && git merge v$VERSION && git push origin main"
          exit 1
      - name: Reconcile the tag after an unsuccessful publish command
        if: ${{ failure() && steps.push_tag.outcome == 'success' && steps.publish.outcome != 'success' }}
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VIEW_ERROR="$RUNNER_TEMP/npm-rollback-view-error.log"
          TAG_REF="refs/tags/v$VERSION"
          TAG_QUERY_STATUS=0
          git ls-remote --exit-code --tags origin "$TAG_REF" >/dev/null || TAG_QUERY_STATUS=$?
          if [[ "$TAG_QUERY_STATUS" -ne 0 ]]; then
            if [[ "$TAG_QUERY_STATUS" -eq 2 ]]; then
              echo "Remote tag v$VERSION no longer exists; no rollback is needed."
              exit 0
            fi
            echo "::error::Unable to verify remote tag v$VERSION. No tag was deleted."
            exit 1
          fi
          if npm view "$PACKAGE_NAME@$VERSION" version --json >/dev/null 2>"$VIEW_ERROR"; then
            echo "::error::npm reports ${PACKAGE_NAME}@${VERSION} as published. The remote tag was retained; land the tagged commit manually with: git fetch --tags && git merge v${VERSION} && git push origin main"
            exit 1
          fi
          if grep -q "E404" "$VIEW_ERROR"; then
            git push origin ":$TAG_REF"
            echo "Deleted unpublished remote tag v$VERSION so a later dispatch can recreate it."
            exit 0
          fi
          echo "::error::Unable to determine whether ${PACKAGE_NAME}@${VERSION} was published. The remote tag was retained."
          exit 1
