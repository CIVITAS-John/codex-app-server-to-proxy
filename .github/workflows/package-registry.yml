name: Registry-backed package smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.os }} / Node.js 24
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Test a clean registry-backed tarball installation
        run: npm run test:package -- --registry-install
